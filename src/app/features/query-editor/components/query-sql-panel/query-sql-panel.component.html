<div class="panel-heading">
  <div>
    <h2>SQL</h2>
    <small>{{ store.activeQueryLabel() }}</small>
  </div>
  <div class="panel-heading__actions">
    <span>{{ store.activeValidationIssues().length === 0 ? 'Ready' : 'Needs review' }}</span>
    <button
      type="button"
      [title]="isCollapsed() ? 'Expand SQL' : 'Collapse SQL'"
      [attr.aria-label]="isCollapsed() ? 'Expand SQL' : 'Collapse SQL'"
      [attr.aria-expanded]="!isCollapsed()"
      (click)="toggleCollapsed()"
    >
      {{ isCollapsed() ? '+' : '-' }}
    </button>
  </div>
</div>
@if (!isCollapsed()) {
  <pre>{{ store.activeSql() }}</pre>
}
